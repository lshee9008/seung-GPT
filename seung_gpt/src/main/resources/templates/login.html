<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 - 승-GPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex items-center justify-center">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-96 border border-gray-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-500 mb-2">승-GPT</h1>
            <p class="text-gray-400 text-sm">Secure Local AI System</p>
        </div>
        
        <form action="/login" method="post" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">아이디</label>
                <input type="text" name="username" required 
                    class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">비밀번호</label>
                <input type="password" name="password" required 
                    class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200">
                로그인
            </button>
        </form>
        
        <div class="text-center mt-6">
            <a href="/signup" class="text-sm text-green-400 hover:underline">계정이 없으신가요? 회원가입</a>
        </div>
    </div>
</body>
</html>
