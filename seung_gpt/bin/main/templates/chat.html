<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>승-GPT | AI Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
   
    <style>
        body { font-family: 'Pretendard', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { gray: { 850: '#1f2937', 900: '#111827', 950: '#030712' } } } }
        }
    </script>
</head>
<body class="bg-gray-950 text-gray-200 h-screen flex overflow-hidden selection:bg-blue-500 selection:text-white">
    <!-- [좌측] 사이드바 -->
    <div class="w-[280px] bg-gray-900 border-r border-gray-800 flex flex-col transition-all duration-300 z-20" id="sidebar">
        <div class="p-5">
            <div class="flex items-center gap-3 mb-6 px-2">
                <div class="w-8 h-8 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-900/20">
                    <i data-lucide="bot" class="w-5 h-5 text-white"></i>
                </div>
                <h1 class="font-bold text-xl tracking-tight text-white">승-GPT</h1>
            </div>
           
            <button onclick="createRoom()" class="w-full flex items-center justify-center gap-2 bg-gray-800 hover:bg-gray-750 border border-gray-700 hover:border-gray-600 text-white p-3 rounded-xl transition-all duration-200 shadow-sm group">
                <i data-lucide="plus" class="w-4 h-4 text-gray-400 group-hover:text-white transition-colors"></i>
                <span class="font-medium text-sm">새로운 대화</span>
            </button>
        </div>
       
        <div class="flex-1 overflow-y-auto px-3 py-2 space-y-1" id="roomList"></div>
       
        <div class="p-4 border-t border-gray-800 bg-gray-900/50">
            <div class="flex items-center justify-between p-2 rounded-xl hover:bg-gray-800/50 transition-colors">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-emerald-500 to-cyan-500 flex items-center justify-center text-white font-bold shadow-lg border border-gray-700">
                        <span th:text="${#strings.substring(nickname, 0, 1)}">U</span>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-sm font-semibold text-gray-200" th:text="${nickname}">User</span>
                        <span class="text-[10px] text-gray-500">Local Account</span>
                    </div>
                </div>
                <a href="/logout" class="p-2 text-gray-500 hover:text-red-400 hover:bg-red-400/10 rounded-lg transition-all" title="로그아웃">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                </a>
            </div>
        </div>
    </div>
    <!-- [우측] 메인 영역 -->
    <div class="flex-1 flex flex-col h-full relative bg-gray-950">
       
        <!-- 헤더 -->
        <header class="h-16 border-b border-gray-800/50 flex items-center px-6 bg-gray-950/80 backdrop-blur-md sticky top-0 z-10 justify-between">
            <h2 id="currentRoomTitle" class="font-semibold text-gray-200 truncate max-w-lg">채팅방을 선택하세요</h2>
            <div class="text-xs px-2 py-1 rounded bg-gray-800 text-gray-400 border border-gray-700 flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                Online
            </div>
        </header>
        <!-- 메시지 영역 -->
        <div id="messageList" class="flex-1 overflow-y-auto p-4 space-y-6 scrollbar-hide scroll-smooth pb-32">
            <div class="h-full flex flex-col items-center justify-center text-center space-y-6 opacity-0 animate-[fadeIn_0.5s_ease-out_forwards]">
                <div class="w-24 h-24 flex items-center justify-center bg-gray-900 rounded-[2rem] shadow-2xl border border-gray-800 relative">
                    <div class="absolute inset-0 bg-blue-500/10 rounded-[2rem] blur-xl"></div>
                    <i data-lucide="bot" class="w-12 h-12 text-blue-500 relative z-10"></i>
                </div>
                <div>
                    <h3 class="text-2xl font-bold text-white mb-2">무엇을 도와드릴까요?</h3>
                    <p class="text-gray-500 text-sm max-w-sm mx-auto leading-relaxed">
                        안전한 로컬 AI 환경에서 대화를 시작해보세요.<br>
                        모든 데이터는 사용자의 PC에만 저장됩니다.
                    </p>
                </div>
            </div>
        </div>
        <!-- 하단 입력 영역 -->
        <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-gray-950 via-gray-950/90 to-transparent z-20">
            <div class="max-w-4xl mx-auto flex items-end gap-3">
               
                <!-- 모델 선택 버튼 -->
                <div class="relative group flex-shrink-0">
                    <div class="relative bg-gray-900 border border-gray-700 hover:border-blue-500/50 rounded-2xl flex items-center shadow-lg transition-all h-[56px] cursor-pointer overflow-hidden">
                        <div class="pl-4 pr-2 text-blue-400">
                            <i data-lucide="cpu" class="w-5 h-5"></i>
                        </div>
                        <div class="relative h-full flex items-center">
                            <select id="modelSelect" class="bg-transparent text-gray-300 text-sm font-medium py-3 pr-8 pl-1 cursor-pointer outline-none appearance-none hover:text-white transition-colors w-[140px] truncate h-full">
                                <option value="" disabled selected>모델 로딩...</option>
                            </select>
                            <div class="absolute right-3 pointer-events-none text-gray-500">
                                <i data-lucide="chevron-up" class="w-4 h-4"></i>
                            </div>
                        </div>
                    </div>
                    <div id="modelStatusIcon" class="absolute -top-1 -right-1 bg-gray-900 rounded-full p-0.5 border border-gray-800 shadow-sm"></div>
                </div>
                <!-- 입력 폼 -->
                <form onsubmit="sendMessage(event)" class="flex-1 relative group">
                    <div class="absolute inset-0 bg-blue-500/5 rounded-2xl blur opacity-0 group-focus-within:opacity-100 transition duration-500"></div>
                    <div class="relative bg-gray-900 border border-gray-700 rounded-2xl flex items-center p-1.5 shadow-2xl transition-all focus-within:border-blue-500/50 focus-within:ring-1 focus-within:ring-blue-500/20 h-[56px]">
                        <input type="text" id="msgInput" placeholder="메시지를 입력하세요..." autocomplete="off"
                            class="w-full bg-transparent text-gray-200 placeholder-gray-500 text-sm px-4 focus:outline-none h-full" disabled>
                        <button type="submit" id="sendBtn" class="h-[44px] w-[44px] flex items-center justify-center bg-blue-600 hover:bg-blue-500 text-white rounded-xl transition-all shadow-lg shadow-blue-600/20 disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none flex-shrink-0 mr-0.5" disabled>
                            <i data-lucide="send" class="w-5 h-5 ml-0.5"></i>
                        </button>
                    </div>
                </form>
            </div>
           
            <div class="text-center mt-3">
                <p class="text-[10px] text-gray-600 flex items-center justify-center gap-1.5">
                    <i data-lucide="shield-check" class="w-3 h-3 text-gray-500"></i>
                    <span>데이터는 외부 서버로 전송되지 않습니다.</span>
                </p>
            </div>
        </div>
    </div>
    <script>
        let currentRoomId = null;
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadRooms();
            loadModels();
        });
        async function loadModels() {
            const selectEl = document.getElementById('modelSelect');
            const statusIcon = document.getElementById('modelStatusIcon');
            selectEl.innerHTML = '<option disabled selected>검색 중...</option>';
            statusIcon.innerHTML = '<i data-lucide="loader-2" class="w-3 h-3 animate-spin text-yellow-500"></i>';
            lucide.createIcons();
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                const res = await fetch('/api/models', { signal: controller.signal });
                clearTimeout(timeoutId);
                if (!res.ok) throw new Error("API Error");
                const models = await res.json();
                selectEl.innerHTML = '';
                if (!models || models.length === 0) {
                    selectEl.innerHTML = '<option value="llama3">모델 없음</option>';
                    statusIcon.innerHTML = '<i data-lucide="alert-circle" class="w-3 h-3 text-red-500"></i>';
                } else {
                    models.forEach((modelName, index) => {
                        const option = document.createElement('option');
                        option.value = modelName;
                        option.text = modelName;
                        option.className = "bg-gray-800 text-gray-200 py-2";
                        if (index === 0) option.selected = true;
                        selectEl.appendChild(option);
                    });
                    statusIcon.innerHTML = '<i data-lucide="check-circle-2" class="w-3 h-3 text-emerald-500"></i>';
                }
            } catch (e) {
                selectEl.innerHTML = '<option value="llama3">연결 실패</option>';
                statusIcon.innerHTML = '<i data-lucide="wifi-off" class="w-3 h-3 text-red-500"></i>';
            } finally { lucide.createIcons(); }
        }
        // [핵심 수정] 목록에 삭제 버튼 추가
        async function loadRooms() {
            try {
                const res = await fetch('/api/rooms');
                if (res.redirected) { window.location.href = res.url; return; }
                const rooms = await res.json();
                const listEl = document.getElementById('roomList');
                listEl.innerHTML = '';
                rooms.forEach(room => {
                    const isActive = currentRoomId === room.id;
                    const div = document.createElement('div');
                    div.onclick = () => enterRoom(room.id, room.title);
                    // group 클래스로 호버 효과 감지
                    div.className = `group relative flex items-center gap-2 p-3 rounded-xl cursor-pointer transition-all duration-200 border ${isActive ? 'bg-gray-800 border-gray-700 shadow-md' : 'hover:bg-gray-800/50 border-transparent hover:border-gray-800'}`;
                   
                    const date = new Date(room.createdAt).toLocaleDateString();
                   
                    div.innerHTML = `
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 text-sm font-medium ${isActive ? 'text-white' : 'text-gray-400 group-hover:text-gray-200'}">
                                <i data-lucide="message-square" class="w-4 h-4 flex-shrink-0"></i>
                                <span class="truncate">${room.title}</span>
                            </div>
                            <span class="text-[10px] text-gray-600 pl-6">${date}</span>
                        </div>
                        <!-- 삭제 버튼: 기본 숨김, 호버 시 표시 -->
                        <button onclick="deleteRoom(event, ${room.id})" class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 rounded-lg text-gray-500 hover:text-red-400 hover:bg-red-400/10 opacity-0 group-hover:opacity-100 transition-all z-10" title="삭제">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    `;
                    listEl.appendChild(div);
                });
                lucide.createIcons();
            } catch (e) { console.error(e); }
        }
        // [삭제 기능 함수]
        async function deleteRoom(event, roomId) {
            event.stopPropagation(); // 방 입장 이벤트 방지
            if (!confirm("정말 이 대화를 삭제하시겠습니까?")) return;
            try {
                const res = await fetch(`/api/rooms/${roomId}`, { method: 'DELETE' });
                if (res.ok) {
                    // 현재 보고 있는 방이면 화면 초기화
                    if (currentRoomId === roomId) {
                        currentRoomId = null;
                        document.getElementById('currentRoomTitle').innerText = "채팅방을 선택하세요";
                        document.getElementById('messageList').innerHTML = `<div class="h-full flex flex-col items-center justify-center text-center space-y-6"><div class="w-20 h-20 flex items-center justify-center bg-gray-900 rounded-[2rem] shadow-2xl border border-gray-800"><i data-lucide="bot" class="w-10 h-10 text-blue-500"></i></div><p class="text-gray-500 text-sm">대화가 삭제되었습니다.</p></div>`;
                        document.getElementById('msgInput').disabled = true;
                        lucide.createIcons();
                    }
                    loadRooms(); // 목록 갱신
                } else { alert("삭제 실패"); }
            } catch (e) { alert("오류 발생"); }
        }
        async function createRoom() {
            try {
                const res = await fetch('/api/rooms', { method: 'POST' });
                const room = await res.json();
                await loadRooms();
                enterRoom(room.id, room.title);
            } catch (e) { alert("방 생성 실패"); }
        }
        async function enterRoom(roomId, title) {
            currentRoomId = roomId;
            document.getElementById('currentRoomTitle').innerText = title;
            const input = document.getElementById('msgInput');
            input.disabled = false;
            document.getElementById('sendBtn').disabled = false;
            input.focus();
            loadRooms();
            try {
                const res = await fetch(`/api/rooms/${roomId}/messages`);
                const messages = await res.json();
                renderMessages(messages);
            } catch (e) { alert("메시지 로드 실패"); }
        }
        function renderMessages(messages) {
            const container = document.getElementById('messageList');
            container.innerHTML = '';
            if (!Array.isArray(messages) || messages.length === 0) return;
            messages.forEach(msg => {
                const isUser = msg.sender === 'USER';
                const div = document.createElement('div');
                div.className = `flex w-full ${isUser ? 'justify-end' : 'justify-start'} animate-[fadeIn_0.3s_ease-out]`;
               
                const timeStr = new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const modelTag = msg.modelName ? `<span class="text-[10px] text-blue-400/70 bg-blue-900/20 px-1.5 py-0.5 rounded ml-2 border border-blue-800/30">${msg.modelName}</span>` : '';
                const botAvatar = `<div class="w-9 h-9 rounded-xl bg-gray-800 border border-gray-700 flex items-center justify-center flex-shrink-0"><i data-lucide="bot" class="w-5 h-5 text-blue-500"></i></div>`;
                const userAvatar = `<div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center flex-shrink-0 shadow-lg"><i data-lucide="user" class="w-5 h-5 text-white"></i></div>`;
                div.innerHTML = `
                    <div class="flex max-w-[85%] md:max-w-[70%] gap-3 ${isUser ? 'flex-row-reverse' : 'flex-row'}">
                        ${isUser ? userAvatar : botAvatar}
                        <div class="flex flex-col gap-1 ${isUser ? 'items-end' : 'items-start'}">
                            <div class="px-4 py-3 rounded-2xl text-sm leading-relaxed shadow-sm whitespace-pre-wrap ${isUser ? 'bg-blue-600 text-white rounded-tr-sm' : 'bg-gray-800 border border-gray-700 text-gray-200 rounded-tl-sm'}">${msg.content}</div>
                            <div class="flex items-center">
                                <span class="text-[10px] text-gray-500 px-1 select-none">${timeStr}</span>
                                ${!isUser ? modelTag : ''}
                            </div>
                        </div>
                    </div>`;
                container.appendChild(div);
            });
            lucide.createIcons();
            container.scrollTop = container.scrollHeight;
        }
        async function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            const model = document.getElementById('modelSelect').value;
            if(!text || !currentRoomId) return;
            const container = document.getElementById('messageList');
            if(container.querySelector('.w-24')) container.innerHTML = '';
            const userDiv = document.createElement('div');
            userDiv.className = "flex w-full justify-end animate-[fadeIn_0.3s_ease-out]";
            userDiv.innerHTML = `
                <div class="flex max-w-[85%] gap-3 flex-row-reverse">
                    <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center flex-shrink-0 shadow-lg"><i data-lucide="user" class="w-5 h-5 text-white"></i></div>
                    <div class="flex flex-col gap-1 items-end">
                        <div class="px-4 py-3 rounded-2xl text-sm bg-blue-600 text-white rounded-tr-sm shadow-md whitespace-pre-wrap">${text}</div>
                        <span class="text-[10px] text-gray-500 px-1">전송됨</span>
                    </div>
                </div>`;
            container.appendChild(userDiv);
            lucide.createIcons();
            container.scrollTop = container.scrollHeight;
            input.value = '';
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'loadingIndicator';
            loadingDiv.className = "flex w-full justify-start mt-4 animate-[fadeIn_0.3s_ease-out]";
            loadingDiv.innerHTML = `
                <div class="flex gap-3">
                    <div class="w-9 h-9 rounded-xl bg-gray-800 border border-gray-700 flex items-center justify-center"><i data-lucide="bot" class="w-5 h-5 text-blue-500"></i></div>
                    <div class="bg-gray-800 border border-gray-700 px-4 py-3 rounded-2xl rounded-tl-sm text-gray-400 text-sm flex items-center gap-2 shadow-sm">
                        <span class="w-2 h-2 bg-blue-500 rounded-full animate-bounce"></span>
                        <span class="w-2 h-2 bg-blue-500 rounded-full animate-bounce delay-75"></span>
                        <span class="w-2 h-2 bg-blue-500 rounded-full animate-bounce delay-150"></span>
                        <span class="ml-1 font-medium text-blue-400">${model}</span>
                        <span>답변 생성 중...</span>
                    </div>
                </div>`;
            container.appendChild(loadingDiv);
            lucide.createIcons();
            container.scrollTop = container.scrollHeight;
            try {
                await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ roomId: currentRoomId, message: text, model: model })
                });
                const msgRes = await fetch(`/api/rooms/${currentRoomId}/messages`);
                const messages = await msgRes.json();
                renderMessages(messages);
                loadRooms();
            } catch(err) {
                alert("오류: " + err);
                if(loadingDiv) loadingDiv.remove();
            }
        }
    </script>
</body>
</html>
