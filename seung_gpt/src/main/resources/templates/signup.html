<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - 승-GPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex items-center justify-center">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-96 border border-gray-700">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-green-500 mb-2">회원가입</h1>
            <p class="text-gray-400 text-sm">새로운 계정을 생성합니다</p>
        </div>
        
        <form action="/signup" method="post" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">아이디</label>
                <input type="text" name="username" required 
                    class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-green-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">비밀번호</label>
                <input type="password" name="password" required 
                    class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-green-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">닉네임</label>
                <input type="text" name="nickname" required 
                    class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-green-500 focus:outline-none">
            </div>
            <button type="submit" 
                class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition duration-200 mt-4">
                가입하기
            </button>
        </form>
        
        <div class="text-center mt-6">
            <a href="/login" class="text-sm text-blue-400 hover:underline">이미 계정이 있으신가요? 로그인</a>
        </div>
    </div>
</body>
</html>
