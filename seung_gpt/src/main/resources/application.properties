spring.application.name=seung_gpt
# 서버 포트
server.port=8080

# [핵심 변경] mem(메모리) -> file(파일)로 변경
# ./data/seung_gpt_db 라는 파일에 데이터를 영구 저장합니다.
spring.datasource.url=jdbc:h2:file:./data/seung_gpt_db;AUTO_SERVER=TRUE

spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# 콘솔에 SQL 로그 출력
spring.jpa.show-sql=true

# [중요] update로 설정되어 있어야 기존 데이터를 안 지우고 유지합니다.
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=true
spring.thymeleaf.cache=false